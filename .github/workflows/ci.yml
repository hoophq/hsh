name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Fast lint + typecheck job. Runs once on Linux; doesn't need the matrix
  # since these checks aren't OS-dependent.
  typecheck:
    name: Typecheck
    # Skip the auto-generated release bump commit (release.yml writes these
    # with `[skip ci]` in the subject so we don't run the full matrix on a
    # version-only diff).
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  # Full test suite, including shell-integration tests, run across the
  # supported (host OS, shell) combinations called out in the ENG-357 matrix.
  # ubuntu-latest covers Linux/{bash,zsh,dash,fish}; macos-latest covers
  # macOS/{bash 3.2,zsh,fish} which is the production target for many users.
  test:
    name: Test (${{ matrix.os }})
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      # Install the additional shells the integration tests exercise.
      # ubuntu-latest already has bash + dash + sh; we add zsh + fish.
      # macos-latest already has bash 3.2 + zsh + sh; we add fish.
      - name: Install shells (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh fish dash

      - name: Install shells (macOS)
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test
